name: Sync videos

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours (owner decision 2026-07-13: halves API/LLM usage; new uploads land within half a day)
  workflow_dispatch: {}      # allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    # Default GITHUB_TOKEN permissions are often read-only for Issues; the
    # failure/recovery steps below need write access to open/close one.
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r worker/requirements.txt
      - run: python worker/sync.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          # Not read by plain `sync.py` today (only --live/--notify-festivals
          # send pushes) - present so this workflow doesn't need editing
          # again if a future mode here starts sending one.
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}

      # This runs unattended every 12h with no other observer, so a silent
      # failure can go unnoticed for days. Rather than add a new external
      # service (Slack/Discord webhook), this stays inside GitHub's own free
      # tooling: file an issue on failure, and auto-close it once a later run
      # succeeds - so "is there an open sync-failure issue" is the at-a-glance
      # health check, with no separate dashboard to remember to look at.
      - name: File an issue if the sync failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = "sync-failure";
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });
            if (open.length > 0) return; // already tracked, don't spam
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Video sync failed",
              labels: [label],
              body: `The scheduled sync run failed. Log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Close any open sync-failure issue after a successful run
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const label = "sync-failure";
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });
            for (const issue of open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "A later sync run succeeded - closing.",
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
              });
            }

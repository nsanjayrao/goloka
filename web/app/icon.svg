<svg width="512" height="512" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Goloka mark: thousand-petal lotus (concept 1), full-bleed on the dark
       app background. One petal path rotated 8x around a saffron center dot -
       see docs/logo-concepts/concept-1-thousand-petal-lotus.svg. -->
  <rect width="64" height="64" fill="#0B0E1A"/>
  <defs>
    <path id="favicon-petal" d="M32,32 Q26,20 32,8 Q38,20 32,32 Z"/>
  </defs>
  <g fill="#F4F1E8">
    <use href="#favicon-petal"/>
    <use href="#favicon-petal" transform="rotate(45 32 32)"/>
    <use href="#favicon-petal" transform="rotate(90 32 32)"/>
    <use href="#favicon-petal" transform="rotate(135 32 32)"/>
    <use href="#favicon-petal" transform="rotate(180 32 32)"/>
    <use href="#favicon-petal" transform="rotate(225 32 32)"/>
    <use href="#favicon-petal" transform="rotate(270 32 32)"/>
    <use href="#favicon-petal" transform="rotate(315 32 32)"/>
  </g>
  <circle cx="32" cy="32" r="5" fill="#F0A83C"/>
</svg>
